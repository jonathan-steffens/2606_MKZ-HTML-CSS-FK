<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Test</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 100px 2fr;
            grid-template-rows: repeat(3, 100px);
            grid-auto-rows: 100px;

            gap: 10px;
            grid-template-areas:
                "header header header"
                "cont1 free cont2"
                "footer footer footer"
            ;
        }


        .item:nth-child(1) {
            grid-column-start: 1;
            grid-row-start: 1;
        }

        .item:nth-child(2) {
            grid-column-start: -2;
            grid-row-start: 1;
        }

        .free {
            grid-area: free;
        }

        .item {
            transition: all 0.3 ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .item:hover {
            filter: brightness(2)
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="item" style="background:rgb(15, 22, 169)">1</div>
        <div class="item" style="background:rgb(50, 205, 179)">2</div>
        <div class="item free" style="background:rgb(0, 128, 111)">3</div>
        <div class="item" style="background:rgb(0, 128, 11)">4</div>
        <div class="item" style="background:rgb(128, 205, 50)">5</div>
        <div class="item" style="background:rgb(238, 255, 0)">6</div>
        <div class="item" style="background:rgb(255, 166, 0)">7</div>
        <div class="item" style="background:rgb(255, 0, 0)">8</div>
        <div class="item" style="background:rgb(255, 0, 136)">9</div>
        <div class="item" style="background:rgb(255, 0, 212)">10</div>
        <div class="item" style="background:rgb(132, 0, 255)">11</div>
        <div class="item" style="background:rgb(85, 0, 255)">12</div>

    </div>
</body>

</html>
